name: Build Android APK

# Builds the OuiMoove Android app (Capacitor shell around the Vite build).
# Debug APK is unsigned-for-store but installable on any Android device —
# download it from the run's Artifacts section.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'android/**'
      - 'capacitor.config.json'
      - 'package.json'
      - 'index.html'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      # `secrets` isn't a recognized named-value inside step-level `if:`
      # expressions — mirror it into a plain env var first, then gate on that.
      HAS_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
      HAS_PLAY_KEY: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        # `npm ci` requires exact npm-version-compatible lockfile serialization;
        # local dev here uses npm 11.x while this runner's Node 22 bundles
        # npm 10.x, which disagreed over esbuild's optional platform deps.
        # `npm install` resolves against the lockfile without that strict check.
        run: npm install

      - name: Build web assets
        run: npm run build
        # These are client-side-public values — they ship verbatim inside every
        # web bundle served at ouimoove.vercel.app, so they are not secrets.
        env:
          VITE_SUPABASE_URL: https://jgbwuhonuiqwwpxzdeiw.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnYnd1aG9udWlxd3dweHpkZWl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDY0NTcsImV4cCI6MjA4OTQyMjQ1N30.FW3jXFxfh7A5nvQR1omVGw3Ax0ZQENBuUYSgayvCVDs
          VITE_PAYMENT_MODE: paydunya
          VITE_VAPID_PUBLIC_KEY: BAu0rBr0UMzfyb9aVsrhECbni1csa1DCDwMGO2WrbOaFpeJwTGdpczzMLAeUQE923szJyqYVWYX2wFyWcyCEnX0

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ouimoove-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Signed release bundle for the Play Store ──
      # Runs only when the signing secrets are configured on the repo.
      - name: Decode upload keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/release.keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

      - name: Build signed release AAB
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          # Play rejects a re-used versionCode on the same track — the run
          # number always increases, unlike a hand-maintained counter.
          CI_VERSION_CODE: ${{ github.run_number }}

      - name: Upload release AAB artifact
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ouimoove-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      # ── Auto-publish to the closed testing track ──
      # Runs only when both the keystore and the Play service account are
      # configured. The service account needs "Release manager" (or Admin)
      # access granted under Play Console → Setup → API access.
      - name: Publish to Play closed testing (ouimoove-test)
        if: ${{ env.HAS_KEYSTORE == 'true' && env.HAS_PLAY_KEY == 'true' }}
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.ouimoove.myapp
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ouimoove-test
          status: completed
          whatsNewDirectory: android/whatsnew
